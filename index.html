<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE BAND NAME</title>
  <link rel="stylesheet" href="style.css">
  <!-- Importing a clean, modern font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar">
  <ul class="nav-links">
    <li><a href="#music">Music</a></li>
    <li><a href="#videos">Videos</a></li>
    <li><a href="#tour">Tour</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- Hero Banner with Band Photo & Logo -->
<header class="hero">
  <!-- Overlay makes text readable regardless of the photo brightness -->
  <div class="overlay"></div>



  <div class="scroll-indicator">
    <span>↓</span>
  </div>
</header>

<!-- Content Sections (Example) -->
<main>
  <section id="music" class="content-section">
    <h2>Latest Release</h2>
    <p>Single RED out now on all platforms.</p>
    <div class="placeholder-box">
      <img src="media/RED_Sample_cover.png" alt="Band Logo" class="band-logo">
    </div>
  </section>

  <section id="videos" class="content-section">
    <h2>Videos</h2>
    <p>BROAD ISSUE Live in Ditzingen (FULL SET)</p>
    <div class="placeholder-box video-box">
      <iframe
              src="https://www.youtube.com/watch?v=UzV1WyPXTb4"
              title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
      </iframe>
    </div>
  </section>

  <section id="tour" class="content-section">
    <h2>Concert Dates</h2>
    <ul class="tour-list">
      <li><span>MAR 07</span> <span>LEONBERG</span> <button>TICKETS</button></li>
      <li><span>MAR 20</span> <span>LEONBERG</span> <button>TICKETS</button></li>
      <li><span>APR 25</span> <span>KIRCHHEIM</span> <button>TICKETS</button></li>
    </ul>
  </section>
</main>

<footer>
  <img src="media/socials_placeholder.png" alt="Band Logo" class="socials-logo">
  <p>&copy; 2026 BROAD ISSUE. All Rights Reserved.</p>
  <img src="media/logo.png" alt="Band Logo" class="band-logo-footer">

</footer>

</body>
</html>
